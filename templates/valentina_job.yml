resources:
  jobs:
    medtech_pipeline:
      name: "MedTech Sales Data Pipeline"
      tasks:
        - task_key: "setup_data_in_volume"
          notebook_task:
            notebook_path: ../src/notebooks/00_setup_data_in_volume.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              volume_name: ${var.volume_name}
          environment_key: default

        - task_key: "setup_and_load"
          depends_on:
            - task_key: "setup_data_in_volume"
          notebook_task:
            notebook_path: ../src/notebooks/01_setup_and_load.sql
            warehouse_id: ${var.warehouse_id}
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              volume_name: ${var.volume_name}

        - task_key: "add_uc_metadata"
          depends_on:
            - task_key: "setup_and_load"
          notebook_task:
            notebook_path: ../src/notebooks/02_add_uc_metadata.sql
            warehouse_id: ${var.warehouse_id}
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}

        - task_key: "add_business_semantics"
          depends_on:
            - task_key: "add_uc_metadata"
          notebook_task:
            notebook_path: ../src/notebooks/03_add_business_semantics.sql
            warehouse_id: ${var.warehouse_id}
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}

        - task_key: "create_genie_space"
          depends_on:
            - task_key: "add_business_semantics"
          notebook_task:
            notebook_path: ../src/genie/04_create_genie_space.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              warehouse_id: ${var.warehouse_id}
              genie_space_id: __GENIE_SPACE_ID__
              app_name: __APP_NAME__
          environment_key: default
      environments:
        - environment_key: default
          spec:
            client: "2"
