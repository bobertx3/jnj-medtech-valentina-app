bundle:
  name: medtech-sales-ask-genie

include:
  - resources/*.yml

variables:
  catalog:
    default: "__CATALOG__"
  schema:
    default: "__SCHEMA__"
  warehouse_id:
    default: "__WAREHOUSE_ID__"
  volume_name:
    default: "__VOLUME_NAME__"

targets:
  dev:
    default: true
    workspace:
      profile: __PROFILE__
      host: __WORKSPACE_URL__
      root_path: /Workspace/Shared/medtech-genie-app
