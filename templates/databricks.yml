bundle:
  name: jnj-genie-workshop

include:
  - resources/*.yml

variables:
  catalog:
    default: "__CATALOG__"
  schema:
    default: "__SCHEMA__"
  warehouse_id:
    default: "__WAREHOUSE_ID__"
  volume_name:
    default: "__VOLUME_NAME__"
  dataset:
    default: "__DATASET__"
  genie_space_id:
    default: "__GENIE_SPACE_ID__"
  app_name:
    default: "__APP_NAME__"

targets:
  dev:
    default: true
    workspace:
      profile: __PROFILE__
      host: __WORKSPACE_URL__
      root_path: /Workspace/Shared/jnj-genie-workshop
