command:
  - uvicorn
  - app:app
  - --host
  - "0.0.0.0"
  - --port
  - "8000"

auth:
  - user

env:
  - name: DATABRICKS_WAREHOUSE_ID
    value: "9488857c6101bb75"
  - name: GENIE_SPACE_ID
    value: "01f12f7548a611dbb1599e198079c32f"

resources:
  - name: valentina_warehouse
    sql_warehouse:
      id: 9488857c6101bb75
      permission: CAN_USE
  - name: valentina_genie_space
    genie_space:
      id: 01f12f7548a611dbb1599e198079c32f
      permission: CAN_MANAGE
