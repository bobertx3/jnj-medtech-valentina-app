command:
  - uvicorn
  - app:app
  - --host
  - "0.0.0.0"
  - --port
  - "8000"

auth:
  - user

env:
  - name: DATABRICKS_WAREHOUSE_ID
    value: "__WAREHOUSE_ID__"
  - name: GENIE_SPACE_ID
    value: "__GENIE_SPACE_ID__"

resources:
  - name: sql_warehouse
    sql_warehouse:
      id: __WAREHOUSE_ID__
      permission: CAN_USE
  - name: genie_space
    genie_space:
      id: __GENIE_SPACE_ID__
      permission: CAN_MANAGE
