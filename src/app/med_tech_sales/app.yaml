command:
  - uvicorn
  - app:app
  - --host
  - "0.0.0.0"
  - --port
  - "8000"

auth:
  - user

env:
  - name: DATABRICKS_WAREHOUSE_ID
    value: "6f538f22f07fe0d8"
  - name: GENIE_SPACE_ID
    value: "01f131fb36aa184b8b53f281573aeb01"

resources:
  - name: sql_warehouse
    sql_warehouse:
      id: 6f538f22f07fe0d8
      permission: CAN_USE
  - name: genie_space
    genie_space:
      id: 01f131fb36aa184b8b53f281573aeb01
      permission: CAN_MANAGE
