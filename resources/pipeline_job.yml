resources:
  jobs:
    data_pipeline:
      name: "Data Pipeline"
      tasks:
        - task_key: "setup_data_in_volume"
          notebook_task:
            notebook_path: ../src/notebooks/00_setup_data_in_volume.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              volume_name: ${var.volume_name}
              dataset: ${var.dataset}
          environment_key: default

        - task_key: "setup_and_load"
          depends_on:
            - task_key: "setup_data_in_volume"
          notebook_task:
            notebook_path: ../src/notebooks/${var.dataset}/01_setup_and_load.sql
            warehouse_id: ${var.warehouse_id}
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              volume_name: ${var.volume_name}

        - task_key: "add_uc_metadata"
          depends_on:
            - task_key: "setup_and_load"
          notebook_task:
            notebook_path: ../src/notebooks/${var.dataset}/02_add_uc_metadata.sql
            warehouse_id: ${var.warehouse_id}
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}

        - task_key: "add_business_semantics"
          depends_on:
            - task_key: "add_uc_metadata"
          notebook_task:
            notebook_path: ../src/notebooks/${var.dataset}/03_add_business_semantics.sql
            warehouse_id: ${var.warehouse_id}
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}

        - task_key: "create_genie_space"
          depends_on:
            - task_key: "add_business_semantics"
          notebook_task:
            notebook_path: ../src/genie/04_create_genie_space.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              warehouse_id: ${var.warehouse_id}
              genie_space_id: 01f128afd07410268461ef36a3a865dd
              app_name: mt-test-genie
              dataset: ${var.dataset}
          environment_key: default
      environments:
        - environment_key: default
          spec:
            client: "2"
